services:
  - type: web
    name: saumya-mishra-project3
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_ORIGIN
        sync: false
      - key: COOKIE_NAME
        value: sudoku_session
      - key: MONGODB_URI
        sync: false
